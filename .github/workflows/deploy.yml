# Deploy backend and frontend to Fly.io when code is pushed to main.
# Requires GitHub repo secret: FLY_API_TOKEN (create with: fly auth token)
name: Deploy

on:
  push:
    branches:
      - main

concurrency: deploy  # one deploy at a time

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend (suggestion)
        run: flyctl deploy ./backend --remote-only -a suggestion
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy frontend (suggestion-web)
        run: flyctl deploy ./frontend/suggestion --remote-only -a suggestion-web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
