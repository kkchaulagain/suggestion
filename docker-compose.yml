services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/suggestion
      - FRONTEND_FORM_BASE_URL=http://localhost:3002/feedback-forms
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/suggestion
      dockerfile: Dockerfile.dev
    ports:
      - "3002:5173"
    environment:
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      - ./frontend/suggestion:/app
      - /app/node_modules
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
