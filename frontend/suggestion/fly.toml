# Frontend – deploy with: fly deploy ./frontend/suggestion  (from repo root)
app = "suggestion-web"
primary_region = "bom"

[build]
  [build.args]
    VITE_API_URL = "https://suggestion.fly.dev"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/"
