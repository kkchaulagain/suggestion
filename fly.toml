# Fly.io app config – deploy from repo root so Fly finds this and the root Dockerfile.
# Set app name: fly apps create <name> or replace 'suggestion-api' below.
app = "suggestion-api"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"
